<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewing Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #683FCF;
      --accent-light: rgba(104,63,207,0.08);
      --accent-border: rgba(104,63,207,0.3);
      --bg: #F8F7F6;
      --surface: #FFFFFF;
      --border: rgba(0,0,0,0.06);
      --text-primary: #1A1A1A;
      --text-secondary: #6B6B6B;
      --text-tertiary: #9A9A9A;
      --text-muted: #C0C0C0;
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
      --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body { margin: 0; background: #111; overflow: hidden; font-family: var(--font); }

    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      height: 44px; background: rgba(255,255,255,0.97); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .topbar-back {
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
      padding: 5px 12px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-secondary); font-size: 12px; font-weight: 500;
      cursor: pointer; font-family: var(--font); text-decoration: none;
      transition: all 0.15s ease;
    }
    .topbar-back:hover { border-color: var(--accent-border); color: var(--accent); }
    .topbar-breadcrumb {
      display: flex; align-items: center; gap: 6px; min-width: 0; font-size: 13px; color: var(--text-tertiary);
    }
    .topbar-breadcrumb-name { font-weight: 600; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .topbar-breadcrumb-sep { color: var(--text-muted); flex-shrink: 0; }
    .topbar-breadcrumb-page { color: var(--accent); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }

    .topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .topbar-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 14px; border-radius: 8px;
      border: none; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: var(--font); transition: all 0.15s ease;
    }
    .topbar-btn.feedback { background: var(--accent); color: white; }
    .topbar-btn.feedback:hover { background: #5a34b3; }
    .topbar-btn.open { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); }
    .topbar-btn.open:hover { border-color: var(--accent-border); color: var(--accent); }

    .proto-frame {
      position: fixed; top: 44px; left: 0; right: 0; bottom: 0;
      border: none; width: 100%; height: calc(100vh - 44px);
    }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
      z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-backdrop.open { display: flex; }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }

    .modal {
      background: var(--surface); border-radius: 16px; width: 100%; max-width: 480px;
      box-shadow: var(--shadow-lg); overflow: hidden;
      animation: modalIn 0.25s cubic-bezier(0.2, 0, 0, 1);
    }
    .modal-header { padding: 20px 24px 0; }
    .modal-title { font-size: 17px; font-weight: 650; color: var(--text-primary); margin-bottom: 2px; }
    .modal-breadcrumb { font-size: 12.5px; color: var(--text-tertiary); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .modal-breadcrumb-page { color: var(--accent); font-weight: 500; }
    .modal-subtitle { font-size: 12px; color: var(--text-muted); }
    .modal-body { padding: 16px 24px 24px; }
    .modal-field { margin-bottom: 14px; }
    .modal-label { display: block; font-size: 12px; font-weight: 550; color: var(--text-secondary); margin-bottom: 6px; }
    .modal-input {
      width: 100%; padding: 9px 14px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text-primary); font-size: 13px; font-family: var(--font); outline: none;
      transition: all 0.15s ease;
    }
    .modal-input:focus { border-color: var(--accent-border); box-shadow: 0 0 0 3px var(--accent-light); }
    .modal-textarea {
      width: 100%; padding: 10px 14px; border-radius: 10px; min-height: 90px; resize: vertical;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text-primary); font-size: 13px; font-family: var(--font); outline: none; line-height: 1.5;
      transition: all 0.15s ease;
    }
    .modal-textarea:focus { border-color: var(--accent-border); box-shadow: 0 0 0 3px var(--accent-light); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .modal-btn {
      padding: 9px 20px; border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: var(--font); border: none; transition: all 0.15s ease;
    }
    .modal-btn.secondary { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); }
    .modal-btn.secondary:hover { background: rgba(0,0,0,0.04); }
    .modal-btn.primary { background: var(--accent); color: white; }
    .modal-btn.primary:hover { background: #5a34b3; }
    .modal-btn.primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .modal-success { text-align: center; padding: 32px 24px; }
    .modal-success-icon { font-size: 36px; margin-bottom: 12px; }
    .modal-success-title { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .modal-success-subtitle { font-size: 12.5px; color: var(--text-tertiary); }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <a class="topbar-back" href="index.html">← Dashboard</a>
      <div class="topbar-breadcrumb">
        <span class="topbar-breadcrumb-name" id="proto-name"></span>
        <span class="topbar-breadcrumb-sep" id="breadcrumb-sep" style="display:none;">→</span>
        <span class="topbar-breadcrumb-page" id="proto-page"></span>
      </div>
    </div>
    <div class="topbar-right">
      <button class="topbar-btn feedback" onclick="openFeedback()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        Leave Feedback
      </button>
      <button class="topbar-btn open" onclick="openDirect()">Open in New Tab ↗</button>
    </div>
  </div>

  <iframe class="proto-frame" id="proto-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" id="modal"></div>
  </div>

  <script>
    // ============================================================
    // PASTE YOUR SLACK WORKFLOW BUILDER WEBHOOK URL BELOW
    // It should start with: https://hooks.slack.com/triggers/...
    // ============================================================
    const WEBHOOK_URL = "https://hooks.slack.com/triggers/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";
    // ============================================================

    const params = new URLSearchParams(window.location.search);
    const protoFile = params.get('proto');
    let protoData = null;
    let currentPage = '';

    // --- Breadcrumb detection ---
    function detectCurrentPage() {
      try {
        const iframe = document.getElementById('proto-frame');
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        const iframeWin = iframe.contentWindow;

        const hash = iframeWin.location.hash;
        if (hash && hash.length > 1) {
          return hash.replace(/^#\/?/, '').replace(/[/-]/g, ' / ').replace(/\b\w/g, c => c.toUpperCase()).trim();
        }

        const activeEls = iframeDoc.querySelectorAll('[class*="active"], [aria-selected="true"], .selected, .current');
        for (const el of activeEls) {
          const text = (el.textContent || '').trim();
          if (text && text.length < 50 && text.length > 1) return text;
        }

        const headings = iframeDoc.querySelectorAll('h1, h2');
        for (const h of headings) {
          const rect = h.getBoundingClientRect();
          if (rect.top >= 0 && rect.top < iframeWin.innerHeight) {
            let t = (h.textContent || '').trim();
            if (t.length > 40) t = t.substring(0, 40) + '…';
            return t;
          }
        }

        const title = iframeDoc.title || '';
        if (title && protoData && title !== protoData.name) return title;

        return '';
      } catch (e) { return ''; }
    }

    function updateBreadcrumb() {
      currentPage = detectCurrentPage();
      document.getElementById('breadcrumb-sep').style.display = currentPage ? '' : 'none';
      document.getElementById('proto-page').textContent = currentPage || '';
    }

    setInterval(updateBreadcrumb, 1000);

    function openDirect() { window.open('prototypes/' + protoFile, '_blank'); }

    // --- Feedback Modal ---
    function openFeedback() {
      updateBreadcrumb();
      const name = protoData ? protoData.name : protoFile;
      const breadcrumbHTML = currentPage
        ? '<div class="modal-breadcrumb"><span>' + name + '</span><span style="color:var(--text-muted);">→</span><span class="modal-breadcrumb-page">' + currentPage + '</span></div>'
        : '';

      document.getElementById('modal').innerHTML =
        '<div class="modal-header">' +
          '<h2 class="modal-title">Leave Feedback</h2>' +
          breadcrumbHTML +
          '<p class="modal-subtitle">Your feedback will be posted to Slack</p>' +
        '</div>' +
        '<div class="modal-body">' +
          '<div class="modal-field">' +
            '<label class="modal-label">Your name</label>' +
            '<input class="modal-input" type="text" id="feedback-name" placeholder="e.g., Marcus" />' +
          '</div>' +
          '<div class="modal-field">' +
            '<label class="modal-label">Feedback</label>' +
            '<textarea class="modal-textarea" id="feedback-text" placeholder="What do you think? Any suggestions or issues?"></textarea>' +
          '</div>' +
          '<div class="modal-actions">' +
            '<button class="modal-btn secondary" onclick="closeModal()">Cancel</button>' +
            '<button class="modal-btn primary" id="send-btn" onclick="sendFeedback()">Send Feedback</button>' +
          '</div>' +
        '</div>';

      document.getElementById('modal-backdrop').classList.add('open');
      document.getElementById('feedback-name').focus();
    }

    function closeModal() { document.getElementById('modal-backdrop').classList.remove('open'); }
    document.getElementById('modal-backdrop').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

    async function sendFeedback() {
      const reviewer = document.getElementById('feedback-name').value.trim();
      const feedback = document.getElementById('feedback-text').value.trim();

      if (!reviewer || !feedback) {
        if (!reviewer) document.getElementById('feedback-name').style.borderColor = '#EF4444';
        if (!feedback) document.getElementById('feedback-text').style.borderColor = '#EF4444';
        return;
      }

      const btn = document.getElementById('send-btn');
      btn.disabled = true;
      btn.textContent = 'Sending…';

      const p = protoData || { name: protoFile, author: 'Unknown' };

      // Send flat JSON to Slack Workflow Builder
      const payload = {
        reviewer: reviewer,
        prototype: p.name,
        screen: currentPage || '(main)',
        feedback: feedback
      };

      try {
        if (WEBHOOK_URL !== "YOUR_WORKFLOW_WEBHOOK_URL_HERE") {
          navigator.sendBeacon(
            WEBHOOK_URL,
            new Blob([JSON.stringify(payload)], { type: 'application/json' })
          );
        } else {
          console.log("Would send to Slack:", payload);
        }

        document.getElementById('modal').innerHTML =
          '<div class="modal-success">' +
            '<div class="modal-success-icon">✓</div>' +
            '<p class="modal-success-title">Feedback sent!</p>' +
            '<p class="modal-success-subtitle">Posted to Slack</p>' +
          '</div>';
        setTimeout(closeModal, 2000);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Send Feedback';
        alert('Failed to send feedback. Check the webhook URL.');
      }
    }

    // --- Init ---
    async function init() {
      if (!protoFile) { window.location.href = 'index.html'; return; }
      document.getElementById('proto-frame').src = 'prototypes/' + protoFile;
      try {
        const res = await fetch('prototypes.json');
        const data = await res.json();
        protoData = data.find(p => p.file === protoFile);
        if (protoData) {
          document.getElementById('proto-name').textContent = protoData.name;
          document.title = protoData.name + ' — Prototype Playground';
        }
      } catch (e) {}
      document.getElementById('proto-frame').addEventListener('load', () => { setTimeout(updateBreadcrumb, 500); });
    }

    init();
  </script>
</body>
</html>
