  const [applePayState, setApplePayState] = useState("idle");

  const chipResRef = useRef({});
  const curStepRef = useRef("start");
  const selRef = useRef({ bundle: "oval" });
  const timerRef = useRef(null);
  const scrollRef = useRef(null);
  const aliveRef = useRef(true);

  useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: "smooth", block: "end" }); }, [messages, chips, isTyping, ended]);

  useEffect(() => {
    aliveRef.current = true;
    sendBrand("start");
    return () => { aliveRef.current = false; clearTimeout(timerRef.current); };
  }, []);

  function sendBrand(stepId, idx = 0) {
    if (!aliveRef.current) return;
    const step = STEPS[stepId];
    if (!step) return;
    curStepRef.current = stepId;
    if (idx >= step.brandMessages.length) {
      setIsTyping(false);
      if (step.isEnd) setEnded(true);
      else {
        setChips(step.chips || []); chipResRef.current = step.responses || {};
        if (step.autoVoice && !voiceSent) {
          timerRef.current = setTimeout(() => triggerVoiceMessage(), 100);
        }
      }
      return;
    }
    setIsTyping(true);
    timerRef.current = setTimeout(() => {
      if (!aliveRef.current) return;
      setIsTyping(false);
      setMessages((p) => [...p, { sender: "brand", ...step.brandMessages[idx], id: Date.now() + idx, stepId, _sel: { ...selRef.current } }]);
      timerRef.current = setTimeout(() => sendBrand(stepId, idx + 1), 400);
    }, 1200);
  }

  function handleChip(label) {
    const res = chipResRef.current[label];
    if (!res) return;
    if (res.data) selRef.current = { ...selRef.current, ...res.data };
    setChips([]); chipResRef.current = {};
    setMessages((p) => [...p, { sender: "user", type: "text", text: res.userText, time: getTime(), id: Date.now() }]);
    timerRef.current = setTimeout(() => sendBrand(res.next), 800);
  }

  function handleSend() {
    const txt = inputText.trim();
    if (!txt || chips.length === 0) return;
    const first = chips[0], res = chipResRef.current[first];
    if (!res) return;
    if (res.data) selRef.current = { ...selRef.current, ...res.data };
    setChips([]); chipResRef.current = {}; setInputText("");
    setMessages((p) => [...p, { sender: "user", type: "text", text: txt, time: getTime(), id: Date.now() }]);
    timerRef.current = setTimeout(() => sendBrand(res.next), 800);
  }

  /* ── Apple Pay Flow ── */
  function handleApplePay() {
    setShowApplePay(true);
    setApplePayState("ready");
  }

  function handleApplePayConfirm() {
    setApplePayState("processing");
    setTimeout(() => {
      setApplePayState("success");
      setTimeout(() => {
        setShowApplePay(false);
        setApplePayState("idle");
        selRef.current.orderNum = "GLM-" + Math.floor(10000 + Math.random() * 90000);
        setChips([]); chipResRef.current = {};
        setMessages((p) => [...p, { sender: "user", type: "text", text: "Payment approved with Apple Pay ✅", time: getTime(), id: Date.now() }]);
        setTimeout(() => sendBrand("confirmed"), 800);
      }, 1200);
    }, 1800);
  }

  function handleApplePayCancel() {
    setShowApplePay(false);
    setApplePayState("idle");
  }

  /* ── Voice Message Simulation ── */
  function triggerVoiceMessage() {
    if (voiceSent) return;
    setVoiceSent(true);
    // After chips show, wait then show recording indicator
    timerRef.current = setTimeout(() => {
      setIsRecording(true);
      setChips([]); chipResRef.current = {};
      // After "recording", send the voice message
      timerRef.current = setTimeout(() => {
        setIsRecording(false);
        setMessages((p) => [...p, { sender: "user", type: "voice", duration: "0:14", time: getTime(), id: Date.now() }]);
        // Brand responds to voice message
        timerRef.current = setTimeout(() => sendBrand("faq_duration"), 800);
      }, 2800);
    }, 2200);
  }

  function restart() {
    clearTimeout(timerRef.current);
    setMessages([]); setChips([]); chipResRef.current = {};
    selRef.current = { bundle: "oval" };
    setIsTyping(false); setEnded(false); setInputText("");
    setShowApplePay(false); setApplePayState("idle"); setVoiceSent(false); setIsRecording(false);
    timerRef.current = setTimeout(() => sendBrand("start"), 600);
  }

  const active = chips.length > 0 && !isTyping;

  return (
    <>
      <style>{`
        @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes dotB{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
        @keyframes cg{0%,100%{box-shadow:0 1px 3px rgba(0,0,0,.08)}50%{box-shadow:0 0 0 3px rgba(236,72,153,.15)}}
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

        .mi{animation:msgIn .3s ease-out forwards}
        .d1{animation:dotB 1.2s infinite 0s}.d2{animation:dotB 1.2s infinite .15s}.d3{animation:dotB 1.2s infinite .3s}
        .cg{animation:cg 2s ease-in-out infinite}
        .ns::-webkit-scrollbar{display:none}.ns{scrollbar-width:none}
      `}</style>
      <div className="flex flex-col items-center justify-center min-h-screen p-4" style={{ background: "linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%)" }}>


        <div className="relative" style={{ width: 375, height: 740 }}>
          <div className="absolute inset-0 rounded-[3rem]" style={{ background: "#0a0a0a", boxShadow: "0 25px 60px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.08)" }} />
          <div className="absolute top-3 left-1/2 bg-black rounded-full z-30" style={{ width: 118, height: 32, transform: "translateX(-50%)" }} />

          <div className="absolute overflow-hidden flex flex-col" style={{ top: 11, left: 11, right: 11, bottom: 11, borderRadius: "2.3rem", background: "#fff" }}>

              <span className="text-xs font-semibold text-gray-900">9:41</span>
              <div className="flex items-center gap-1.5">
                <div className="flex gap-0.5 items-end">
                  <div style={{ width:3,height:5,background:"#1a1a1a",borderRadius:1 }}/>
                  <div style={{ width:3,height:8,background:"#1a1a1a",borderRadius:1 }}/>
                  <div style={{ width:3,height:11,background:"#1a1a1a",borderRadius:1 }}/>
                  <div style={{ width:3,height:9,background:"#d1d5db",borderRadius:1 }}/>
                </div>
                <svg width="15" height="11" viewBox="0 0 15 11" fill="none"><path d="M7.5 1C5.3 1 3.3 1.9 1.8 3.3L3 4.5C4.2 3.4 5.8 2.7 7.5 2.7s3.3.7 4.5 1.8L13.2 3.3C11.7 1.9 9.7 1 7.5 1zm0 3.4c-1.2 0-2.3.5-3.2 1.3L5.5 7c.6-.5 1.3-.9 2-.9s1.4.4 2 .9l1.2-1.3c-.9-.8-2-1.3-3.2-1.3zM7.5 8c-.5 0-.9.2-1.2.5L7.5 10l1.2-1.5c-.3-.3-.7-.5-1.2-.5z" fill="#222"/></svg>
                <div style={{ border:"1.2px solid #1a1a1a",borderRadius:3,width:24,height:11,display:"flex",alignItems:"flex-end",padding:1.5 }}>
                  <div style={{ width:15,height:6,background:"#34c759",borderRadius:1.5 }}/>
                </div>
              </div>
            </div>

            <div className="flex items-center gap-2.5 px-4 py-2 border-b border-gray-100">
              <svg width="9" height="16" viewBox="0 0 9 16" fill="none"><path d="M8 1L1 8l7 7" stroke="#007AFF" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              <div className="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-sm" style={{ background:"linear-gradient(135deg,#ec4899,#e11d48)" }}>G</div>

              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.11 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" stroke="#007AFF" strokeWidth="1.3"/></svg>

              {messages.map((msg) => (

            )}

            {/* Input */}
            <div className="flex items-center gap-2 px-3 py-2 bg-white border-t border-gray-100">
              <div className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center" style={{ color:"#9ca3af" }}>

              </div>
              <div className="flex-1 relative">
                <input type="text" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSend()}
                  placeholder="Text Message RCS" disabled={!active}
                  className="w-full bg-gray-100 rounded-full px-4 py-2 pr-10 text-sm outline-none" style={{ color:active?"#1f2937":"#9ca3af" }}/>
                {inputText.trim() ? (
                  <button onClick={handleSend} className="absolute right-2 top-1/2 flex items-center justify-center"
                    style={{ transform:"translateY(-50%)", color:"#007AFF", cursor:"pointer", background:"none", border:"none", padding:0 }}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13m11-11l-7 20-4-9-9-4 20-7z" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>

                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3Z" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><path d="M12 19v4m-4 0h8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>

            {/* Apple Pay Overlay */}

                state={applePayState}

                onCancel={handleApplePayCancel}

        </div>


      </div>
    </>
  );

      <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style={{ background:"linear-gradient(135deg,#ec4899,#e11d48)" }}>G</div>

        {msg.type === "promo" && <PromoCard/>}
        {msg.type === "carousel" && <BundleCarousel onAction={onAction}/>}

  );
}
