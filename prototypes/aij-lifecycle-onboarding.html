/* ─── Inject base styles ─── */
const styleEl = document.createElement("style");
styleEl.textContent = `
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #FAFAF8; color: #1a1a1a; -webkit-font-smoothing: antialiased; overflow: hidden; }
  .fraunces { font-family: 'Fraunces', serif; }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-40px); } }
  @keyframes pulse { 0%, 100% { opacity: .4; } 50% { opacity: 1; } }
  @keyframes slideInRight { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
  @keyframes stageCardIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes copilotSlideIn { from { width: 0; min-width: 0; opacity: 0; } to { width: 320px; min-width: 320px; opacity: 1; } }
  @keyframes copilotSlideOut { from { width: 320px; min-width: 320px; opacity: 1; } to { width: 0; min-width: 0; opacity: 0; } }
  @keyframes bubblePop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes dotBounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-4px); } }
  .animate-fadeInUp { animation: fadeInUp .7s cubic-bezier(.16,1,.3,1) forwards; }
  .animate-fadeIn { animation: fadeIn .5s ease forwards; }
  .animate-slideUp { animation: slideUp .5s cubic-bezier(.16,1,.3,1) forwards; }
  .animate-slideInRight { animation: slideInRight .45s cubic-bezier(.16,1,.3,1) forwards; }
  .animate-stageCardIn { animation: stageCardIn .4s cubic-bezier(.16,1,.3,1) forwards; }
  .chip-dropdown { position: relative; display: inline-flex; }
  .chip-dropdown-menu {
    position: absolute; top: calc(100% + 4px); left: 0; z-index: 50;
    background: white; border: 1px solid #e5e5e0; border-radius: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,.08); min-width: 180px; overflow: hidden;
  }
  .chip-dropdown-menu button {
    display: block; width: 100%; text-align: left; padding: 9px 14px;
    font-size: 13.5px; color: #3a3a3a; border: none; background: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: background .15s;
  }
  .chip-dropdown-menu button:hover { background: #f5f2fb; }
  .chip-dropdown-menu button.active { color: #683FCF; font-weight: 500; }
  input::placeholder { color: #b0afa8; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: transparent; border-radius: 10px; transition: background .3s; }
  *:hover::-webkit-scrollbar-thumb { background: #d5d5d0; }
  ::-webkit-scrollbar-track { background: transparent; }
  .nav-item { display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 10px; cursor: pointer; transition: all .15s; position: relative; }
  .nav-item:hover { background: #f0f0ec; }
  .nav-item.active-purple { background: #ede8f8; }
  .nav-item.active-pink { background: #fce8e6; }
`;
document.head.appendChild(styleEl);

/* ─── Chip Component ─── */
function Chip({ value, options, onChange }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  return (
    <span className="chip-dropdown" ref={ref}>
      <button
        onClick={() => setOpen(!open)}
        style={{
          display: "inline-flex",
          alignItems: "center",
          gap: 4,
          padding: "3px 10px",
          background: ACCENT_LIGHT,
          color: ACCENT,
          border: `1px solid ${ACCENT}22`,
          borderRadius: 7,
          fontSize: 14,
          fontWeight: 500,
          cursor: "pointer",
          fontFamily: "'DM Sans', sans-serif",
          transition: "all .2s",
          lineHeight: 1.5,
          whiteSpace: "nowrap",
        }}
        onMouseEnter={(e) => {
          e.currentTarget.style.background = "#ddd5f3";
          e.currentTarget.style.borderColor = ACCENT + "44";
        }}
        onMouseLeave={(e) => {
          e.currentTarget.style.background = ACCENT_LIGHT;
          e.currentTarget.style.borderColor = ACCENT + "22";
        }}
      >
        {value}
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style={{ marginLeft: 2 }}>
          <path d="M3 4.5L6 7.5L9 4.5" stroke={ACCENT} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      </button>
      {open && (
        <div className="chip-dropdown-menu">
          {options.map((opt) => (
            <button
              key={opt}
              className={opt === value ? "active" : ""}
              onClick={() => { onChange(opt); setOpen(false); }}
            >
              {opt}
            </button>
          ))}
        </div>
      )}
    </span>
  );
}

      style={{

/* ─── Loyal Stage Card Component (with model switching) ─── */
function LoyalStageCard({ stage, onApprove, onSkip, showActions, animDelay = 0, config, onConfigChange }) {
  const activeModelId = config?.modelId ?? (stage.defaultModelId || "purchase-frequency");
  const [altExpanded, setAltExpanded] = useState(false);
  const model = LOYALTY_MODELS[activeModelId];

  const defChip = config?.defChip ?? model.defChipDefault;
  const defChip2 = config?.defChip2 ?? (model.defChip2Default || null);
  const goalChip = config?.goalChip ?? model.goalChipDefault;
  const disengageDays = config?.disengageDays ?? stage.disengageDaysDefault;
  const disengageCondition = config?.disengageCondition ?? stage.disengageConditionDefault;
  const update = (key, val) => onConfigChange?.({ ...config, modelId: activeModelId, [key]: val });

  const switchModel = (newModelId) => {
    const newModel = LOYALTY_MODELS[newModelId];
    onConfigChange?.({ ...config, modelId: newModelId, defChip: newModel.defChipDefault, defChip2: newModel.defChip2Default || null, goalChip: newModel.goalChipDefault });
    setAltExpanded(false);
  };

  const alternativeModels = Object.values(LOYALTY_MODELS).filter((m) => m.id !== activeModelId);

          fontSize: 11, fontWeight: 500, color: ACCENT, background: ACCENT_LIGHT,

        </span>
      </div>

      {/* Definition with chips from active model */}
      <div style={{ fontSize: 15, lineHeight: 1.7, color: "#3a3a3a" }}>
        <p style={{ marginBottom: 12 }}>
          {model.defPre}
          <Chip value={defChip} options={model.defChipOptions} onChange={(v) => update("defChip", v)} />
          {model.defMid || ""}

/* ─── Side Panel ─── */
function SidePanel({ approvedStages, stages, onEditStage, stageConfigs }) {
  const [hoveredCard, setHoveredCard] = useState(null);
  if (approvedStages.length === 0) return null;

  const getConfigSummary = (stage, i) => {
    const cfg = stageConfigs?.[i];
    if (!cfg) return { def: stage.defSummary, goal: stage.goalSummary, disengage: stage.disengageSummary };
    const def = cfg.defChip ? `${cfg.defChip}${cfg.defChip2 ? ", " + cfg.defChip2 : ""}` : stage.defSummary;
    const goal = cfg.goalChip || stage.goalSummary;
    const dis = cfg.disengageDays ? `${cfg.disengageDays}, ${cfg.disengageCondition || "no engagement"}` : stage.disengageSummary;
    return { def, goal, disengage: dis };
  };

  return (
    <div
      className="animate-slideInRight"
      style={{
        width: 480, minWidth: 480, height: "100vh",
        background: CARD_BG, borderLeft: `1px solid ${BORDER}`,
        display: "flex", flexDirection: "column", flexShrink: 0, overflow: "hidden",
      }}
    >
      {/* Panel Header */}
      <div style={{ padding: "20px 28px 16px", borderBottom: `1px solid ${BORDER}` }}>
        <h2 className="fraunces" style={{ fontSize: 17, fontWeight: 600, color: TEXT, letterSpacing: "-0.01em" }}>
          Shopper Lifecycle
        </h2>
        <p style={{ fontSize: 12.5, color: TEXT_MUTED, marginTop: 4, lineHeight: 1.5 }}>
          {approvedStages.length} of 4 stages configured
        </p>
      </div>

      {/* Progress Bar */}
      <div style={{ padding: "0 28px", marginTop: 16 }}>
        <div style={{ height: 3, background: SURFACE, borderRadius: 3, overflow: "hidden" }}>
          <div
            style={{
              height: "100%", background: ACCENT, borderRadius: 3,
              width: `${(approvedStages.length / 4) * 100}%`,
              transition: "width .5s cubic-bezier(.16,1,.3,1)",
            }}
          />
        </div>
      </div>

      {/* Stage Cards */}
      <div style={{ flex: 1, overflowY: "auto", padding: "16px 28px 28px" }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
          {stages.map((stage, i) => {
            const isApproved = approvedStages.includes(i);
            const isPending = !isApproved;
            const isHovered = hoveredCard === i && isApproved;
            const summary = getConfigSummary(stage, i);

            return (
              <div key={stage.name}>
                {/* Connector line */}
                {i > 0 && (
                  <div style={{ display: "flex", justifyContent: "center", height: 20 }}>
                    <div style={{ width: 1.5, height: "100%", background: isApproved ? ACCENT + "30" : BORDER }} />
                  </div>
                )}
                <div
                  className={isApproved ? "animate-stageCardIn" : ""}
                  onMouseEnter={() => isApproved && setHoveredCard(i)}
                  onMouseLeave={() => setHoveredCard(null)}
                  style={{
                    background: isApproved ? "white" : SURFACE + "80",
                    border: `1px solid ${isHovered ? ACCENT + "44" : isApproved ? BORDER : "#ececec"}`,
                    borderRadius: 12, padding: "16px 18px",
                    opacity: isPending ? 0.45 : 1,
                    transition: "all .2s",
                    cursor: isApproved ? "default" : "default",
                    position: "relative",
                  }}
                >
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: isApproved ? 10 : 0 }}>
                    <div
                      style={{
                        width: 28, height: 28, borderRadius: 8,
                        background: stage.color + (isApproved ? "18" : "0c"),
                        border: `1.5px solid ${stage.color}${isApproved ? "44" : "22"}`,
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 12, fontWeight: 600, color: stage.color, flexShrink: 0,
                      }}
                    >
                      {isApproved ? (
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                          <path d="M3 7l3 3 5-6" stroke={stage.color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
                        </svg>
                      ) : (
                        i + 1
                      )}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13.5, fontWeight: 600, color: TEXT }}>{stage.name}</div>
                      {!isApproved && (
                        <div style={{ fontSize: 11.5, color: TEXT_MUTED }}>Pending review</div>
                      )}
                    </div>
                    {/* Edit button on hover */}
                    {isHovered && (
                      <button
                        onClick={() => onEditStage(i)}
                        style={{
                          display: "flex", alignItems: "center", gap: 5,
                          padding: "5px 10px", borderRadius: 7,
                          border: `1px solid ${ACCENT}33`,
                          background: ACCENT_BG, color: ACCENT,
                          fontSize: 12, fontWeight: 500, cursor: "pointer",
                          fontFamily: "'DM Sans', sans-serif", transition: "all .15s",
                          flexShrink: 0,
                        }}
                        onMouseEnter={(e) => { e.currentTarget.style.background = "#ddd5f3"; }}
                        onMouseLeave={(e) => { e.currentTarget.style.background = ACCENT_BG; }}
                      >
                        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                          <path d="M7.5 2.5l2 2M2 8l-.5 2.5L4 10l6-6-2-2-6 6z" stroke={ACCENT} strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" />
                        </svg>
                        Edit
                      </button>
                    )}
                  </div>

                  {isApproved && (
                    <div style={{ paddingLeft: 38, display: "flex", flexDirection: "column", gap: 10 }}>
                      {/* Definition */}
                      {summary.def && (
                        <div>
                          <div style={{ fontSize: 10.5, fontWeight: 600, color: "#a0a098", letterSpacing: "0.08em", textTransform: "uppercase", fontVariant: "small-caps", marginBottom: 3 }}>
                            Definition
                          </div>
                          <div style={{ fontSize: 12.5, color: "#2a2a2a", lineHeight: 1.5 }}>
                            {summary.def}
                          </div>
                        </div>
                      )}
                      {/* Goal */}
                      <div>
                        <div style={{ fontSize: 10.5, fontWeight: 600, color: "#a0a098", letterSpacing: "0.08em", textTransform: "uppercase", fontVariant: "small-caps", marginBottom: 3 }}>
                          Goal
                        </div>
                        <div style={{ fontSize: 12.5, color: "#2a2a2a", lineHeight: 1.5 }}>
                          {summary.goal}
                        </div>
                      </div>
                      {/* Disengaged */}
                      {summary.disengage && (
                        <div>
                          <div style={{ fontSize: 10.5, fontWeight: 600, color: "#a0a098", letterSpacing: "0.08em", textTransform: "uppercase", fontVariant: "small-caps", marginBottom: 3 }}>
                            Disengaged
                          </div>
                          <div style={{ fontSize: 12.5, color: "#2a2a2a", lineHeight: 1.5 }}>
                            {summary.disengage}
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ─── Main App ─── */
function App() {
  const [phase, setPhase] = useState(1);
  const [transitioning, setTransitioning] = useState(false);
  const [messages, setMessages] = useState([]);
  const [currentAiStep, setCurrentAiStep] = useState(0);
  const [isTyping, setIsTyping] = useState(false);
  const [inputValue, setInputValue] = useState(
    "BeautyInc sells make up and skin care products, and most customers reorder every 6\u20138 weeks. Show me what my shopper journey looks like."
  );
  const [activeStageActions, setActiveStageActions] = useState(null);
  const [approvedStages, setApprovedStages] = useState([]);
  const [stageConfigs, setStageConfigs] = useState({});
  const [editingStage, setEditingStage] = useState(null);
  const [lifecycleComplete, setLifecycleComplete] = useState(false);
  const [appPage, setAppPage] = useState("chat");
  const [draftingMode, setDraftingMode] = useState(null);
  const [draftingState, setDraftingState] = useState(null);
  const [draftProgress, setDraftProgress] = useState(0);
  const chatEndRef = useRef(null);
  const inputRef = useRef(null);

  const scrollToBottom = useCallback(() => {
    setTimeout(() => {
      chatEndRef.current?.scrollIntoView({ behavior: "smooth", block: "end" });
    }, 100);
  }, []);

  useEffect(() => {
    scrollToBottom();
  }, [messages, isTyping, scrollToBottom]);

  const addAiMessage = useCallback(
    (stepIndex) => {
      if (stepIndex >= AI_MESSAGES.length) return;
      const msg = AI_MESSAGES[stepIndex];
      setIsTyping(true);

      const delay = stepIndex === 0 ? 1800 : 1200;
      setTimeout(() => {
        setIsTyping(false);
        setMessages((prev) => [...prev, { role: "ai", ...msg }]);
        setCurrentAiStep(stepIndex + 1);

        if (msg.type === "completion") {
          setLifecycleComplete(true);
        }

        if (msg.type === "stage") {
          setTimeout(() => setActiveStageActions(msg.stageIndex), 400);
        }

        if (msg.autoAdvance) {
          setTimeout(() => {
            setIsTyping(true);
            setTimeout(() => {
              setIsTyping(false);
              const nextMsg = AI_MESSAGES[stepIndex + 1];
              if (nextMsg) {
                setMessages((prev) => [...prev, { role: "ai", ...nextMsg }]);
                setCurrentAiStep(stepIndex + 2);
                if (nextMsg.type === "stage") {
                  setTimeout(() => setActiveStageActions(nextMsg.stageIndex), 400);
                }
              }
            }, 1200);
          }, 2000);
        }

        scrollToBottom();
      }, delay);
    },
    [scrollToBottom]
  );

  const handleSendMessage = () => {
    if (!inputValue.trim()) return;
    const userMsg = inputValue.trim();
    setInputValue("");

    if (phase === 1) {
      setTransitioning(true);
      setTimeout(() => {
        setPhase(2);
        setMessages([{ role: "user", text: userMsg }]);
        setTimeout(() => addAiMessage(0), 600);
      }, 500);
    } else {
      setMessages((prev) => [...prev, { role: "user", text: userMsg }]);
    }
  };

  const handleStageAction = (action, stageIndex) => {
    setActiveStageActions(null);
    const label = action === "Looks good" ? "Looks good" : action;
    setMessages((prev) => [...prev, { role: "user", text: label }]);

    // If this is an edit-mode action, just confirm and don't advance
    if (editingStage !== null) {
      if (action === "Looks good") {
        // Config is already persisted via handleConfigChange; add confirmation
        setIsTyping(true);
        setTimeout(() => {
          setIsTyping(false);
          setMessages((prev) => [
            ...prev,
            {
              role: "ai",
              type: "text",
              text: `Got it \u2014 ${STAGES[editingStage].name} has been updated. You can see the changes in the preview panel.`,
            },
          ]);
          setEditingStage(null);
          scrollToBottom();
        }, 600);
      } else {
        setEditingStage(null);
      }
      return;
    }

    // Mark stage as approved (for side panel)
    if (action === "Looks good" || action === "Adjust") {
      setApprovedStages((prev) => {
        if (!prev.includes(stageIndex)) {
          return [...prev, stageIndex];
        }
        return prev;
      });
    }

    setTimeout(() => addAiMessage(currentAiStep), 400);
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      handleSendMessage();
    }
  };

  const handleConfigChange = (stageIndex, newConfig) => {
    setStageConfigs((prev) => ({ ...prev, [stageIndex]: newConfig }));
  };

  const handleEditStage = (stageIndex) => {
    setEditingStage(stageIndex);
    const stageName = STAGES[stageIndex].name;

    // Add a typing indicator, then inject AI message with editable card
    setIsTyping(true);
    setTimeout(() => {
      setIsTyping(false);
      setMessages((prev) => [
        ...prev,
        {
          role: "ai",
          type: "stage",
          preText: `Looks like you want to edit the ${stageName} configuration. Go ahead and adjust the settings below \u2014 click "Looks good" when you\u2019re happy with the changes.`,
          stageIndex,
          isEdit: true,
        },
      ]);
      setTimeout(() => setActiveStageActions(stageIndex), 400);
      scrollToBottom();
    }, 800);
  };

  const handleDraftCampaigns = () => {
    setDraftingMode("drafting");
    setDraftingState("loading");
    setDraftProgress(0);
    setAppPage("lifecycle");
  };

  const handleExploreSelf = () => {
    setDraftingMode("exploring");
    setDraftingState("done");
    setAppPage("lifecycle");
  };

  /* ─── Phase 1: Landing ─── */
  if (phase === 1) {
    return (
      <div style={{ display: "flex", height: "100vh" }}>
        <LeftNav showLifecycleNav={lifecycleComplete} />
        <div
          className={transitioning ? "animate-slideUp" : ""}
          style={{
            flex: 1, display: "flex", flexDirection: "column",
            alignItems: "center", justifyContent: "center",
            padding: "40px 24px", background: BG, overflow: "auto",
          }}
        >
          <div style={{ maxWidth: 720, width: "100%", textAlign: "center" }}>
            <div className="animate-fadeInUp" style={{ marginBottom: 48, opacity: 0 }}>
              <div style={{ marginBottom: 28, display: "flex", justifyContent: "center" }}>
                <img src={LANDING_ICON} alt="Journey" style={{ width: 64, height: 64, objectFit: "contain" }} />
              </div>
              <h1
                className="fraunces"
                style={{
                  fontSize: "clamp(28px, 3.2vw, 40px)", fontWeight: 500,
                  lineHeight: 1.25, color: TEXT, letterSpacing: "-0.02em", marginBottom: 20,
                }}
              >
                Every shopper is on a journey.<br />
                Let's meet them where they are.
              </h1>
              <p style={{ fontSize: 17, lineHeight: 1.65, color: TEXT_MUTED, maxWidth: 520, margin: "0 auto" }}>
                Your customers are browsing, buying, coming back, telling friends. They don't see your campaigns &mdash; they feel your brand. Let's map out their journey and build the right experience for every stage.
              </p>
            </div>

            <div className="animate-fadeInUp" style={{ opacity: 0, animationDelay: "200ms", maxWidth: 560, margin: "0 auto" }}>
              <div
                style={{
                  background: CARD_BG, border: `1px solid ${BORDER}`, borderRadius: 16,
                  padding: 6, boxShadow: "0 2px 12px rgba(0,0,0,.04)",
                  transition: "box-shadow .3s, border-color .3s",
                }}
                onMouseEnter={(e) => {
                  e.currentTarget.style.boxShadow = "0 4px 24px rgba(0,0,0,.07)";
                  e.currentTarget.style.borderColor = "#d0d0ca";
                }}
                onMouseLeave={(e) => {
                  e.currentTarget.style.boxShadow = "0 2px 12px rgba(0,0,0,.04)";
                  e.currentTarget.style.borderColor = BORDER;
                }}
              >
                <div style={{ display: "flex", alignItems: "flex-end", gap: 8 }}>
                  <textarea
                    ref={inputRef}
                    value={inputValue}
                    onChange={(e) => setInputValue(e.target.value)}
                    onKeyDown={handleKeyDown}
                    rows={2}
                    style={{
                      flex: 1, border: "none", outline: "none", resize: "none",
                      padding: "14px 16px", fontSize: 15, lineHeight: 1.55,
                      color: TEXT, fontFamily: "'DM Sans', sans-serif", background: "transparent",
                    }}
                  />
                  <button
                    onClick={handleSendMessage}
                    style={{
                      width: 42, height: 42, borderRadius: 11, border: "none",
                      background: ACCENT, color: "white", cursor: "pointer",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      flexShrink: 0, margin: 4, transition: "all .2s",
                    }}
                    onMouseEnter={(e) => { e.currentTarget.style.background = ACCENT_DARK; e.currentTarget.style.transform = "scale(1.04)"; }}
                    onMouseLeave={(e) => { e.currentTarget.style.background = ACCENT; e.currentTarget.style.transform = "scale(1)"; }}
                  >
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                      <path d="M3 9h12M11 5l4 4-4 4" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
                    </svg>
                  </button>
                </div>
              </div>
              <p style={{ fontSize: 13, color: "#b0afa8", marginTop: 14, letterSpacing: "0.01em" }}>
                Or just tell us about your brand in your own words
              </p>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ─── Phase 2: Conversation ─── */
  const showSidePanel = approvedStages.length > 0;

  /* ─── Phase 3: Lifecycle Page ─── */
  if (appPage === "lifecycle") {
    return (
      <div className="animate-fadeIn" style={{ display: "flex", height: "100vh", background: BG }}>
        <LeftNav showLifecycleNav={lifecycleComplete} />
        <LifecyclePage
          stages={STAGES}
          draftingState={draftingState}
          setDraftingState={setDraftingState}
          draftProgress={draftProgress}
          setDraftProgress={setDraftProgress}
          draftingMode={draftingMode}
          stageConfigs={stageConfigs}
          onConfigChange={handleConfigChange}
        />
      </div>
    );
  }

  return (
    <div className="animate-fadeIn" style={{ display: "flex", height: "100vh", background: BG }}>
      <LeftNav showLifecycleNav={lifecycleComplete} />

      {/* Main Chat Area */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0, position: "relative" }}>
        {/* Header */}
        <div
          style={{
            borderBottom: `1px solid ${BORDER}`, background: "rgba(250,250,248,.9)",
            backdropFilter: "blur(12px)", padding: "14px 24px",
            display: "flex", alignItems: "center", gap: 12,
            zIndex: 40, flexShrink: 0,
          }}
        >
          <div
            style={{
              width: 34, height: 34, borderRadius: 10, background: ACCENT + "14",
              display: "flex", alignItems: "center", justifyContent: "center",
            }}
          >
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 1v4M8 11v4M1 8h4M11 8h4" stroke={ACCENT} strokeWidth="1.5" strokeLinecap="round" />
            </svg>
          </div>
          <div>
            <div style={{ fontSize: 14, fontWeight: 600, color: TEXT }}>Lifecycle Setup</div>
            <div style={{ fontSize: 12, color: TEXT_MUTED }}>Mapping your shopper journey</div>
          </div>
        </div>

        {/* Chat Messages */}
        <div
          style={{
            flex: 1, overflowY: "auto", padding: "28px 24px 140px",
            maxWidth: 700, width: "100%", margin: "0 auto",
          }}
        >
          {messages.map((msg, i) => {
            if (msg.role === "user") {
              return (
                <div key={i} className="animate-fadeInUp" style={{ display: "flex", justifyContent: "flex-end", marginBottom: 24, opacity: 0 }}>
                  <div
                    style={{
                      background: TEXT, color: "#f5f5f0", padding: "12px 18px",
                      borderRadius: "16px 16px 4px 16px", maxWidth: "80%",
                      fontSize: 14.5, lineHeight: 1.6,
                    }}
                  >
                    {msg.text}
                  </div>
                </div>
              );
            }

            return (
              <div key={i} className="animate-fadeInUp" style={{ display: "flex", gap: 12, marginBottom: 28, opacity: 0, alignItems: "flex-start" }}>
                <div
                  style={{
                    width: 32, height: 32, borderRadius: 10, background: ACCENT + "14",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    flexShrink: 0, marginTop: 2,
                  }}
                >
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M7 1v4M7 9v4M1 7h4M9 7h4" stroke={ACCENT} strokeWidth="1.3" strokeLinecap="round" />
                  </svg>
                </div>

                <div style={{ flex: 1, minWidth: 0 }}>
                  {msg.type === "greeting" && (
                    <>
                      <div style={{ fontSize: 15, lineHeight: 1.7, color: "#3a3a3a", marginBottom: 4 }}>{msg.text}</div>
                      <ol style={{ margin: "12px 0", paddingLeft: 22, display: "flex", flexDirection: "column", gap: 4 }}>
                        {msg.stages.map((name, idx) => (
                          <li key={idx} style={{ fontSize: 14.5, lineHeight: 1.6, color: "#3a3a3a" }}>
                            {name}
                          </li>
                        ))}
                      </ol>
                      <div className="animate-fadeInUp" style={{ fontSize: 15, lineHeight: 1.7, color: "#3a3a3a", marginTop: 4, opacity: 0, animationDelay: "300ms" }}>
                        {msg.text2}
                      </div>
                    </>
                  )}

                  {msg.type === "stage" && (
                    <>
                      <div style={{ fontSize: 15, lineHeight: 1.7, color: "#3a3a3a", marginBottom: 4 }}>{msg.preText}</div>
                      {STAGES[msg.stageIndex].isLoyaltyModelStage ? (
                        <LoyalStageCard
                          stage={STAGES[msg.stageIndex]}
                          showActions={activeStageActions === msg.stageIndex}
                          onApprove={(action) => handleStageAction(action, msg.stageIndex)}
                          onSkip={() => handleStageAction("Skip", msg.stageIndex)}
                          animDelay={200}
                          config={stageConfigs[msg.stageIndex]}
                          onConfigChange={(cfg) => handleConfigChange(msg.stageIndex, cfg)}
                        />
                      ) : (
                        <StageCard
                          stage={STAGES[msg.stageIndex]}
                          showActions={activeStageActions === msg.stageIndex}
                          onApprove={(action) => handleStageAction(action, msg.stageIndex)}
                          onSkip={() => handleStageAction("Skip", msg.stageIndex)}
                          animDelay={200}
                          config={stageConfigs[msg.stageIndex]}
                          onConfigChange={(cfg) => handleConfigChange(msg.stageIndex, cfg)}
                        />
                      )}
                    </>
                  )}

                  {msg.type === "text" && (
                    <div style={{ fontSize: 15, lineHeight: 1.7, color: "#3a3a3a" }}>{msg.text}</div>
                  )}

                  {msg.type === "completion" && (
                    <>
                      <div style={{ fontSize: 15, lineHeight: 1.7, color: "#3a3a3a", marginBottom: 16 }}>{msg.text}</div>

                      {/* Text summary of stages */}
                      <div className="animate-fadeInUp" style={{ opacity: 0, animationDelay: "100ms", marginBottom: 20 }}>
                        <div style={{
                          background: CARD_BG, border: `1px solid ${BORDER}`, borderRadius: 14,
                          padding: "24px 28px", boxShadow: "0 1px 3px rgba(0,0,0,.03)",
                        }}>
                          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                            {STAGES.map((s) => (
                              <div key={s.name} style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                                <div style={{
                                  width: 24, height: 24, borderRadius: 7, marginTop: 1,
                                  background: s.color + "14", border: `1.5px solid ${s.color}33`,
                                  display: "flex", alignItems: "center", justifyContent: "center",
                                  flexShrink: 0,
                                }}>
                                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                                    <path d="M2.5 6l2.5 2.5L9.5 4" stroke={s.color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                                  </svg>
                                </div>
                                <div>
                                  <div style={{ fontSize: 14, fontWeight: 600, color: TEXT, lineHeight: 1.4 }}>{s.name}</div>
                                  <div style={{ fontSize: 13, color: TEXT_MUTED, lineHeight: 1.5, marginTop: 2 }}>{s.goalSummary}</div>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>

                      {/* Reassurance */}
                      <div className="animate-fadeInUp" style={{ fontSize: 14.5, lineHeight: 1.7, color: "#6a6a62", marginBottom: 28, opacity: 0, animationDelay: "400ms" }}>
                        {msg.text2}
                      </div>

                      {/* Next step */}
                      <div className="animate-fadeInUp" style={{ fontSize: 15, lineHeight: 1.7, color: "#3a3a3a", marginBottom: 20, opacity: 0, animationDelay: "700ms" }}>
                        {msg.text3}
                      </div>

                      {/* Action buttons */}
                      <div className="animate-fadeInUp" style={{ display: "flex", alignItems: "center", gap: 12, opacity: 0, animationDelay: "900ms" }}>
                        <button
                          onClick={() => handleDraftCampaigns()}
                          style={{
                            padding: "12px 28px", borderRadius: 11, border: "none",
                            background: ACCENT, color: "white", fontSize: 14.5, fontWeight: 500,
                            cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                            transition: "all .25s", boxShadow: "0 2px 12px rgba(104,63,207,.18)",
                          }}
                          onMouseEnter={(e) => { e.currentTarget.style.background = ACCENT_DARK; e.currentTarget.style.transform = "translateY(-1px)"; e.currentTarget.style.boxShadow = "0 4px 20px rgba(104,63,207,.28)"; }}
                          onMouseLeave={(e) => { e.currentTarget.style.background = ACCENT; e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = "0 2px 12px rgba(104,63,207,.18)"; }}
                        >
                          Draft messaging strategy
                        </button>
                        <button
                          onClick={() => handleExploreSelf()}
                          style={{
                            padding: "12px 20px", borderRadius: 11, border: "none",
                            background: "transparent", color: TEXT_MUTED, fontSize: 13.5, fontWeight: 400,
                            cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                            transition: "all .15s",
                          }}
                          onMouseEnter={(e) => { e.currentTarget.style.color = TEXT; }}
                          onMouseLeave={(e) => { e.currentTarget.style.color = TEXT_MUTED; }}
                        >
                          I'll explore on my own
                        </button>
                      </div>
                    </>
                  )}
                </div>
              </div>
            );
          })}

          {isTyping && <TypingIndicator />}
          <div ref={chatEndRef} />
        </div>

        {/* Chat Input */}
        <div
          style={{
            position: "absolute", bottom: 0, left: 0, right: 0,
            background: "rgba(250,250,248,.92)", backdropFilter: "blur(12px)",
            borderTop: `1px solid ${BORDER}`, padding: "16px 24px", zIndex: 40,
          }}
        >
          <div
            style={{
              maxWidth: 700, margin: "0 auto", display: "flex", alignItems: "flex-end", gap: 10,
              background: CARD_BG, border: `1px solid ${BORDER}`, borderRadius: 14, padding: 5,
            }}
          >
            <textarea
              ref={inputRef}
              value={inputValue}
              onChange={(e) => setInputValue(e.target.value)}
              onKeyDown={handleKeyDown}
              placeholder="Type a message or adjust something..."
              rows={1}
              style={{
                flex: 1, border: "none", outline: "none", resize: "none",
                padding: "10px 14px", fontSize: 14.5, lineHeight: 1.5,
                color: TEXT, fontFamily: "'DM Sans', sans-serif", background: "transparent",
              }}
            />
            <button
              onClick={handleSendMessage}
              style={{
                width: 38, height: 38, borderRadius: 10, border: "none",
                background: inputValue.trim() ? ACCENT : "#e0e0db", color: "white",
                cursor: inputValue.trim() ? "pointer" : "default",
                display: "flex", alignItems: "center", justifyContent: "center",
                flexShrink: 0, margin: 2, transition: "all .2s",
              }}
              onMouseEnter={(e) => { if (inputValue.trim()) e.currentTarget.style.background = ACCENT_DARK; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = inputValue.trim() ? ACCENT : "#e0e0db"; }}
            >
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M2 8h12M10 4l4 4-4 4" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      {/* Side Panel */}
      {showSidePanel && <SidePanel approvedStages={approvedStages} stages={STAGES} onEditStage={handleEditStage} stageConfigs={stageConfigs} />}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
